<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#1D9E75;--gd:#0a5c42;--gl:#E1F5EE;--gp:#F0FDF9;
  --amber:#F59E0B;--blue:#3B82F6;
  --bg:#F7F6F2;--s:#fff;--b:#E8E6E0;--b2:#D4D0C8;
  --t1:#111;--t2:#444;--t3:#888;--t4:#bbb;
  --r:12px;--rl:18px;--rx:24px;
  --sh:0 2px 12px rgba(0,0,0,.06);--shm:0 4px 24px rgba(0,0,0,.10);
  --sb:240px;
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:Outfit,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh}
button{font-family:Outfit,sans-serif;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:Outfit,sans-serif;font-size:14px}
a{color:inherit;text-decoration:none}
.shell{display:flex;min-height:100vh}
.sidebar{width:var(--sb);background:var(--s);border-right:1px solid var(--b);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.main{margin-left:var(--sb);flex:1}
.page{padding:32px;max-width:1200px;margin:0 auto;width:100%}
.logo-wrap{padding:20px 18px 16px;border-bottom:1px solid var(--b);flex-shrink:0}
.logo-inner{display:flex;align-items:center;gap:10px}
.logo-badge{width:36px;height:36px;background:var(--g);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0}
.logo-name{font-size:18px;font-weight:800}.logo-sub{font-size:11px;color:var(--t3);margin-top:1px}
.nav{padding:8px 8px;flex:1}
.nav-lbl{font-size:10px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.6px;padding:6px 10px 5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);font-size:14px;font-weight:600;color:var(--t2);transition:all .13s;cursor:pointer;width:100%;text-align:left;border:none;background:none;font-family:Outfit,sans-serif;position:relative}
.nav-item:hover{background:var(--bg);color:var(--t1)}
.nav-item.active{background:var(--gl);color:var(--gd);font-weight:700}
.nav-icon{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.nav-badge{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:#EF4444;color:#fff;border-radius:10px;font-size:10px;font-weight:800;padding:1px 6px;min-width:18px;text-align:center;line-height:16px}
.sb-user{padding:12px 14px;border-top:1px solid var(--b);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ava{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;flex-shrink:0}
.ava-sm{width:32px;height:32px;font-size:13px}
.ava-md{width:44px;height:44px;font-size:17px}
.ava-lg{width:64px;height:64px;font-size:24px}
.ava-xl{width:88px;height:88px;font-size:32px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;border-radius:var(--r);font-size:14px;font-weight:700;transition:all .13s;cursor:pointer;border:none;font-family:Outfit,sans-serif}
.btn-p{background:var(--g);color:#fff}.btn-p:hover{background:var(--gd);transform:translateY(-1px);box-shadow:0 4px 14px rgba(29,158,117,.3)}
.btn-g{background:transparent;color:var(--g);border:1.5px solid var(--g)}.btn-g:hover{background:var(--gl)}
.btn-d{background:#FEE2E2;color:#DC2626}
.btn-b{background:#EFF6FF;color:#1D4ED8;border:1.5px solid #BFDBFE}.btn-b:hover{background:#DBEAFE}
.btn-sm{padding:6px 12px;font-size:12px}.btn-lg{padding:13px 28px;font-size:16px}
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--rl);padding:20px;box-shadow:var(--sh)}
.cc{background:var(--s);border:1px solid var(--b);border-radius:var(--rl);padding:18px;transition:all .15s;cursor:pointer}
.cc:hover{border-color:var(--g);box-shadow:var(--shm);transform:translateY(-2px)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.bg{background:var(--gl);color:var(--gd)}.ba{background:#FEF3C7;color:#92400E}
.br{background:#FEE2E2;color:#991B1B}.bgr{background:#F3F4F6;color:#374151}
.bb{background:#EFF6FF;color:#1D4ED8}.ti{background:#EEF2FF;color:#3730A3}
.tp{background:#FEF3C7;color:#92400E}.tc{background:#DCFCE7;color:#166534}
.chip{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:700;background:var(--s);border:1.5px solid var(--b);cursor:pointer;transition:all .13s;white-space:nowrap;font-family:Outfit,sans-serif}
.chip:hover{border-color:var(--g);color:var(--g)}.chip.on{background:var(--g);border-color:var(--g);color:#fff}
.sp-lbl{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:20px;border:1.5px solid var(--b);cursor:pointer;font-size:13px;font-weight:600;transition:all .15s;user-select:none}
.sp-lbl:hover{border-color:var(--g);color:var(--g)}.sp-lbl.on{background:var(--g);border-color:var(--g);color:#fff}
.tw{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--b)}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{background:var(--bg);padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--b)}
tbody td{padding:12px 16px;border-bottom:1px solid var(--b)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg)}
tbody tr.mr td{background:var(--gp)}
.inp{height:42px;border:1.5px solid var(--b);border-radius:var(--r);padding:0 14px;font-size:14px;color:var(--t1);background:var(--s);transition:border-color .13s;width:100%}
.inp:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px rgba(29,158,117,.12)}
.inp.err{border-color:#DC2626 !important}
.inp-ta{min-height:80px;resize:vertical;padding:10px 14px;height:auto;border:1.5px solid var(--b);border-radius:var(--r);font-size:14px;color:var(--t1);background:var(--s);width:100%}
.inp-ta:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px rgba(29,158,117,.12)}
.fld{display:flex;flex-direction:column;gap:6px}
.fld label{font-size:13px;font-weight:700;color:var(--t2)}
.err-msg{font-size:12px;color:#DC2626;margin-top:2px;display:none}
.tabs{display:flex;border-bottom:2px solid var(--b);margin-bottom:24px}
.tab{padding:10px 20px;font-weight:700;font-size:14px;background:none;border:none;border-bottom:3px solid transparent;color:var(--t3);cursor:pointer;margin-bottom:-2px;transition:all .13s;font-family:Outfit,sans-serif}
.tab.on{border-bottom-color:var(--g);color:var(--g)}
.sc{background:var(--s);border:1px solid var(--b);border-radius:var(--rl);padding:20px;display:flex;flex-direction:column;gap:4px}
.sl{font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.sv{font-size:32px;font-weight:900;color:var(--t1);letter-spacing:-1px;line-height:1}
.hero{background:linear-gradient(135deg,var(--g),var(--gd));border-radius:var(--rx);padding:28px 32px;color:#fff;margin-bottom:24px}
#jxd-map{border-radius:var(--rx);overflow:hidden;border:1px solid var(--b)}
.leaflet-container{font-family:Outfit,sans-serif}
.leaflet-popup-content-wrapper{border-radius:14px !important;box-shadow:0 4px 24px rgba(0,0,0,.12) !important}
.leaflet-popup-content{font-family:Outfit,sans-serif !important;font-size:13px;margin:12px 14px}
.pbar{height:6px;background:var(--b);border-radius:3px;overflow:hidden}
.pbar-fill{height:100%;border-radius:3px;transition:width .3s}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.mbox{background:var(--s);border-radius:var(--rx);width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.mhd{padding:24px 24px 0;display:flex;justify-content:space-between;align-items:flex-start}
.mbd{padding:20px 24px 24px;display:flex;flex-direction:column;gap:14px}
.cons-opt{padding:12px;border-radius:12px;border:2px solid var(--b);text-align:center;cursor:pointer;transition:all .13s}
.cons-opt:hover{border-color:var(--g)}.cons-opt.sel{border-color:var(--g)}
.mc{background:var(--s);border:1px solid var(--b);border-radius:var(--rl);padding:16px;border-left:4px solid var(--g);min-width:220px;flex-shrink:0}
.mc.pend{border-left-color:var(--amber)}
.tld{width:24px;height:24px;border-radius:50%;background:var(--b);border:3px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t4);flex-shrink:0;z-index:1}
.tld.done{background:var(--g);border-color:var(--g);color:#fff}
.tld.now{background:var(--g);border-color:var(--g);color:#fff;box-shadow:0 0 0 4px rgba(29,158,117,.2)}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--b2);transition:all .2s}
.sdot.on{background:var(--g);width:24px;border-radius:4px}
.lw{min-height:100vh;display:flex}
.ll{flex:0 0 400px;background:linear-gradient(160deg,var(--g),var(--gd));display:flex;flex-direction:column;justify-content:center;padding:60px 48px;color:#fff}
.lr{flex:1;display:flex;align-items:center;justify-content:center;padding:40px}
.notif-row{display:flex;gap:12px;padding:14px 18px;border-bottom:1px solid var(--b);cursor:pointer;transition:background .13s}
.notif-row:hover{background:var(--bg)}
.notif-row.unread{background:#F0FDF9;border-left:3px solid var(--g)}
.chat-row{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid var(--b);cursor:pointer;transition:background .13s;align-items:center}
.chat-row:hover{background:var(--bg)}
.chat-row.active{background:var(--gp)}
.msg-wrap{display:flex;gap:8px;margin-bottom:8px}
.msg-wrap.mine{flex-direction:row-reverse}
.bubble{max-width:72%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word}
.bubble-mine{background:var(--g);color:#fff;border-bottom-right-radius:4px}
.bubble-other{background:var(--s);border:1px solid var(--b);border-bottom-left-radius:4px}
.star-btn{font-size:36px;cursor:pointer;transition:transform .12s;line-height:1;color:#D4D0C8}
.star-btn:hover{transform:scale(1.15)}
.star-btn.on{color:#F59E0B}
.vbadge-free{display:inline-flex;align-items:center;gap:4px;background:#DCFCE7;color:#166534;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.vbadge-book{display:inline-flex;align-items:center;gap:4px;background:#EFF6FF;color:#1D4ED8;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:12px 22px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.2);pointer-events:none;opacity:0;transition:opacity .25s;font-family:Outfit,sans-serif;white-space:nowrap}
#toast.ok{background:var(--g)}#toast.err{background:#DC2626}#toast.vis{opacity:1}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .2s ease both}
@keyframes su{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.su{animation:su .25s ease both}
@media(max-width:900px){:root{--sb:60px}.logo-name,.logo-sub,.nav-lbl,.sb-user .ava+div,.nav-item span:last-child{display:none}.nav-item{justify-content:center;padding:10px}.nav-badge{right:0;top:2px;transform:none}.page{padding:20px 14px}.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.g2,.g3{grid-template-columns:1fr}.ll{display:none}}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

</style>
</head>

function g(id){return document.getElementById(id);}
function bdg(t,c){return '<span class="badge '+c+'">'+t+'</span>';}
function ava(l,c,sz){
  var s={sm:32,md:44,lg:64,xl:88}[sz||'sm'];
  return '<div class="ava ava-'+(sz||'sm')+'" style="background:'+c+';width:'+s+'px;height:'+s+'px;font-size:'+Math.round(s*.38)+'px">'+l+'</div>';
}
function fmtD(ts){
  var diff=ts-Date.now(),h=diff/3600000,d=new Date(ts);
  var t=d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  if(h<0)  return 'Pasado &middot; '+t;
  if(h<24) return 'Hoy &middot; '+t;
  if(h<48) return 'Ma\u00f1ana &middot; '+t;
  return d.toLocaleDateString('es-ES',{weekday:'short',day:'2-digit',month:'short'})+' &middot; '+t;
}
function renderStars(n,sz){
  var s='',fs=sz||14;
  for(var i=1;i<=5;i++) s+='<span style="color:'+(i<=n?'#F59E0B':'#D4D0C8')+';font-size:'+fs+'px">\u2605</span>';
  return s;
}
function unreadN(){return NOTIFS.filter(function(x){return !x.read;}).length;}
function unreadC(){return CHATS.reduce(function(a,c){return a+(c.unread||0);},0);}

function toast(msg,type){
  var el=g('toast');if(!el)return;
  el.textContent=msg;el.className=(type||'ok')+' vis';
  clearTimeout(_tt);_tt=setTimeout(function(){el.className='';},3000);
}

// ═══════════════════════ MODAL CONVOCATORIA ═══════════════════════
function mConvoDetail(){
  var c=null;
  for(var i=0;i<CONVOS.length;i++) if(CONVOS[i].id===ST.detailConvo){c=CONVOS[i];break;}
  if(!c) return '';
  var sc=SPORTS[c.sport],filled=(c.maxP||2)-(c.spots||0),pct=Math.round(filled/(c.maxP||2)*100);
  var stL={open:'Abierta',full:'Completa',ongoing:'En curso',finished:'Finalizada'};
  var stB={open:'bg',full:'br',ongoing:'bb',finished:'bgr'};
  var steps=['open','full','ongoing','finished'],cur=steps.indexOf(c.status||'open');
  var v=null;VENUES.forEach(function(vv){if(vv.id===c.venueId)v=vv;});
  var h='<div class="mbg" onclick="if(event.target===this)set({detailConvo:null})">';
  h+='<div class="mbox su"><div class="mhd">';
  h+='<div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:24px">'+sc.emoji+'</span><span style="font-size:20px;font-weight:900">'+sc.label+'</span>'+bdg(stL[c.status||'open'],stB[c.status||'open'])+'</div>';

  h+='<div class="mbd">';
  // Timeline
  h+='<div><div style="display:flex;align-items:center;margin:4px 0">';
  steps.forEach(function(st,i){
    h+='<div class="tld'+(i<cur?' done':i===cur?' now':'')+'">'+((i<cur)?'&#10003;':i+1)+'</div>';
    if(i<3) h+='<div style="flex:1;height:2px;background:'+(i<cur?'var(--g)':'var(--b)')+'"></div>';
  });
  h+='</div><div style="display:flex;margin-top:4px">';
  ['Abierta','Completa','En curso','Finalizada'].forEach(function(lbl,i){
    h+='<div style="flex:1;font-size:9px;font-weight:700;color:'+(i<=cur?'var(--g)':'var(--t4)')+';text-align:center">'+lbl+'</div>';
  });
  h+='</div></div>';
  // Info
  var venueInfo=c.venue;
  if(v) venueInfo+=' <span class="'+(v.isPublic?'vbadge-free':'vbadge-book')+'">'+(v.isPublic?'&#128994; Libre':'&#128279; Reserva')+'</span>';

  });
  h+='</div>';
  // Plazas
  h+='<div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span>Plazas ocupadas</span><span style="font-weight:700;color:'+(c.spots===0?'#DC2626':'var(--g)')+'">'+filled+'/'+(c.maxP||2)+'</span></div>';
  h+='<div class="pbar"><div class="pbar-fill" style="width:'+pct+'%;background:'+(pct===100?'#DC2626':'var(--g)')+'"></div></div>';
  h+='<div style="display:flex;margin-top:8px">';
  c.cols.slice(0,5).forEach(function(col,j){h+='<div class="ava ava-sm" style="background:'+col+';border:2px solid white;margin-left:'+(j?-6:0)+'px">J</div>';});
  if(c.spots>0) h+='<div class="ava ava-sm" style="background:var(--b);border:2px solid white;margin-left:-6px;color:var(--t4)">+'+c.spots+'</div>';
  h+='</div></div>';
  if(c.notes) h+='<div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:12px;padding:14px"><div style="font-size:11px;font-weight:700;color:#92400E;margin-bottom:5px">&#128172; ORGANIZADOR</div><div style="font-size:13px;color:#78350F;line-height:1.6">'+c.notes+'</div></div>';
  // Enlace reserva
  if(v&&!v.isPublic&&v.bookingUrl){
    h+='<a href="'+v.bookingUrl+'" target="_blank" style="display:flex;align-items:center;gap:10px;padding:12px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:12px;color:#1D4ED8;font-size:13px;font-weight:700;text-decoration:none">&#128279; Reservar pista en '+v.name+'<span style="margin-left:auto">&#8599;</span></a>';

  if(c.spots>0&&(c.status==='open'||!c.status)){

  }
  h+='</div></div></div>';
  return h;
}

function submitResult(){
  var a=g('sca')&&g('sca').value||'0',b=g('scb')&&g('scb').value||'0';
  var mid=ST.resultMatchId||MY_MATCHES[0].id;
  MY_MATCHES.forEach(function(m){
    if(m.id===mid){m.myScore=parseInt(b)||0;m.rivalScore=parseInt(a)||0;m.confirmedByMe=true;}
  });
  var rival=MY_MATCHES[0].rival;
  MY_MATCHES.forEach(function(m){if(m.id===mid)rival=m.rival;});
  set({showResult:false,resultMatchId:null,showRating:true,ratingTarget:rival});
  toast('Resultado enviado. Esperando confirmacion del rival.','ok');
}

function mRating(){

  h+='<div style="display:flex;gap:10px">';

  h+='</div></div></div></div>';
  return h;

function selectStar(n){
  _starSel=n;
  var btns=document.querySelectorAll('.star-btn');
  for(var i=0;i<btns.length;i++) btns[i].classList.toggle('on',i<n);
  var labs=document.querySelectorAll('.star-btn ~ div, .star-btn+div');
  var lblEl=document.querySelector('#root div[style*="min-height:26px"]');
  if(lblEl){var lbs=['','Mejorable','Correcto','Bueno','Muy bueno','Excelente'];lblEl.textContent=lbs[n]||'';}
  var btn=g('ratingSubmitBtn');if(btn){btn.disabled=false;btn.style.opacity='1';}
}
function submitRating(target){
  if(_starSel===0){toast('Selecciona al menos una estrella','err');return;}
  var comment=g('ratingComment')&&g('ratingComment').value.trim()||'';
  RATINGS.unshift({from:'yo',col:'#1D9E75',stars:_starSel,comment:comment,sport:'Reciente',ago:'Ahora'});
  _starSel=0;
  set({showRating:false,ratingTarget:null});
  toast('Valoracion enviada a @'+target+'. Gracias!','ok');
}

function submitVenue(){
  var nameEl=g('vnName'),nameErrEl=g('vnNameErr'),sportErrEl=g('vnSportErr');

  if(!name){if(nameEl){nameEl.classList.add('err');nameEl.focus();}if(nameErrEl)nameErrEl.style.display='block';return;}
  if(nameEl)nameEl.classList.remove('err');if(nameErrEl)nameErrEl.style.display='none';
  var sports=Array.from(document.querySelectorAll('[id^="vnCB"]:checked')).map(function(el){return el.value;});

  var bookingUrl=g('vnBook')&&g('vnBook').value.trim()||'';
  var nv={id:'p'+Date.now(),name:name,lat:ST.pickedLat,lng:ST.pickedLng,sports:sports,cons:ST.selCons||'good',
    isPublic:_venueIsPublic,bookingUrl:_venueIsPublic?'':bookingUrl,
    note:g('vnNote')&&g('vnNote').value.trim()||'',by:ST.user?ST.user.alias:'anonimo',
    at:Date.now(),status:'pending'};

    h+='<div style="font-size:12px;color:var(--g);font-weight:600">Activo hace 10 min</div></div>';
    h+='<button class="btn btn-g btn-sm" onclick="set({showRating:true,ratingTarget:\''+chat.alias+'\'})">&#11088; Valorar</button></div>';
    h+='<div id="chatMsgs" style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;background:var(--bg)">';
    if(!chat.msgs.length) h+='<div style="text-align:center;padding:32px;color:var(--t4);font-size:13px">Comienza la conversacion enviando un mensaje</div>';

    h+='<button class="btn btn-p" onclick="sendMsg(\''+chat.alias+'\')">Enviar</button></div></div>';

function sendMsg(alias){
  var inp=g('chatInput');if(!inp||!inp.value.trim())return;
  var text=inp.value.trim();
  var chat=null;CHATS.forEach(function(c){if(c.alias===alias)chat=c;});
  if(!chat)return;
  var now=new Date(),ts=now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();
  chat.msgs.push({me:true,text:text,t:ts});chat.lastMsg=text;chat.time='Ahora';
  render();
  setTimeout(function(){
    var replies=['Perfecto!','Entendido, nos vemos alli.','De acuerdo!','Ok, confirmado.','Genial!'];
    chat.msgs.push({me:false,text:replies[Math.floor(Math.random()*replies.length)],t:ts});
    chat.lastMsg=replies[0];render();
  },1100);
}

function validateVenue(id){
  var v=null;PENDING.forEach(function(p){if(p.id===id)v=p;});if(!v)return;
  PENDING=PENDING.filter(function(p){return p.id!==id;});
  v.status='validated';v.rating=0;v.surf=v.surf||'Parque';v.addr=v.addr||'Palencia';
  VENUES.push(v);render();toast('Pista "'+v.name+'" validada y publicada.','ok');
}
function rejectVenue(id){
  var name='';PENDING.forEach(function(v){if(v.id===id)name=v.name;});
  PENDING=PENDING.filter(function(v){return v.id!==id;});render();toast('Pista "'+name+'" rechazada.','ok');
}

      h+='<div style="display:flex;flex-direction:column;gap:14px">';
      [{id:'pfn',lbl:'Nombre completo',val:u.fullName},{id:'pfa',lbl:'Alias deportivo',val:u.alias},{id:'pfm',lbl:'Municipio',val:u.municipality}].forEach(function(f){
        h+='<div class="fld"><label>'+f.lbl+'</label><input class="inp" id="'+f.id+'" value="'+f.val+'"/></div>';
      });
      h+='<div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn btn-g" onclick="set({profileEdit:false})">Cancelar</button>';
      h+='<button class="btn btn-p" onclick="set({profileEdit:false});toast(\'Cambios guardados\',\'ok\')">Guardar cambios</button></div></div></div>';
    }
  } else if(ptab==='ratings'){
    h+='<div style="margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">';
    h+='<div style="font-size:14px;color:var(--t3)">'+RATINGS.length+' valoraciones recibidas</div>';
    h+='<div style="display:flex;align-items:center;gap:6px">'+renderStars(Math.round(avgR),16)+'<span style="font-size:16px;font-weight:800;color:var(--amber)">'+avgR.toFixed(1)+'</span></div></div>';
    if(!RATINGS.length){
      h+='<div style="text-align:center;padding:48px;color:var(--t3)"><div style="font-size:40px;margin-bottom:10px">&#11088;</div><div style="font-weight:700">Aun no tienes valoraciones</div></div>';
    } else {
      RATINGS.forEach(function(r){
        h+='<div class="card" style="margin-bottom:12px"><div style="display:flex;align-items:flex-start;gap:12px">'+ava(r.from[0],r.col,'md');
        h+='<div style="flex:1"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">';
        h+='<div><div style="font-weight:800;font-size:14px">@'+r.from+'</div><div style="font-size:12px;color:var(--t3)">'+r.sport+' &middot; '+r.ago+'</div></div>';
        h+=renderStars(r.stars,16)+'</div>';
        if(r.comment) h+='<div style="font-size:14px;color:var(--t2);line-height:1.6;font-style:italic">"'+r.comment+'"</div>';
        h+='</div></div></div>';
      });
    }
  } else {
    h+='<div style="display:flex;flex-direction:column;gap:10px">';
    MY_MATCHES.forEach(function(m){
      var sc=SPORTS[m.sport];
      h+='<div class="card" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">';
      h+='<div style="font-size:24px">'+sc.emoji+'</div>';
      h+='<div style="flex:1"><div style="font-weight:800;font-size:14px;margin-bottom:3px">'+sc.label+' &middot; vs '+m.rival+'</div>';
      h+='<div style="font-size:13px;color:var(--t3)">'+fmtD(m.date)+' &middot; '+m.venue+'</div></div>';
      if(m.status==='played'&&m.confirmedByMe&&m.confirmedByRival){
        h+='<div style="text-align:center;padding:8px 16px;background:var(--bg);border-radius:10px;font-weight:900;font-size:18px">'+m.rivalScore+' - '+m.myScore+'</div>';
        h+=bdg('Confirmado','bg');
      } else if(m.status==='played'&&m.confirmedByMe){
        h+=bdg('Pendiente rival','ba');
      } else {
        h+=bdg(m.status==='confirmed'?'Confirmado':'Pendiente',m.status==='confirmed'?'bg':'ba');
      }
      h+='<button class="btn btn-b btn-sm" onclick="chatWith(\''+m.rival+'\')">&#128172;</button>';
      h+='</div>';
    });
    h+='</div>';
  }
  h+='<div class="card" style="margin-top:20px;border-color:#FCA5A5"><div style="font-weight:800;font-size:15px;color:#DC2626;margin-bottom:8px">Cuenta</div>';
  h+='<div style="display:flex;gap:10px"><button class="btn btn-d btn-sm" onclick="toast(\'Disponible con Firebase\',\'ok\')">Cambiar contrasena</button>';
  h+='<button class="btn btn-d btn-sm" onclick="set({user:null,page:\'login\'})">Cerrar sesion</button></div></div>';
  return h;
}

// INICIO
render();

</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
</body>
</html>
